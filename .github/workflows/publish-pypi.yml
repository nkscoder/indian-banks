# Publish to PyPI on GitHub Release or manual dispatch.
#
# Setup (one time):
#   GitHub repo → Settings → Secrets and variables → Actions
#   New secret: PYPI_API_TOKEN = pypi-... from https://pypi.org/manage/account/token/

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Verify PyPI token secret
        env:
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::error::Missing secret PYPI_API_TOKEN"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: PYPI_API_TOKEN"
            echo "Value: your pypi-... token from https://pypi.org/manage/account/token/"
            exit 1
          fi
          echo "PyPI token secret is set."

      - name: Show package name and version
        run: |
          NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Package: $NAME version $VERSION"

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --non-interactive dist/*
